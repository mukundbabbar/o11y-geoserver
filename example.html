<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.0 Frameset//EN">
<html><title>MB TEST PAGE</title><head><meta http-equiv="Content-Type" content="text/html; charset=windows-1252">
<head>
<script src="https://cdn.signalfx.com/o11y-gdi-rum/latest/splunk-otel-web.js" crossorigin="anonymous"></script>
<script>

SplunkRum.init({
    realm: "REALM",
    rumAccessToken: "TOKEN",
    applicationName: "MBMacApp",
    deploymentEnvironment: "mac"
});


//****** Tag custom geo location *******
let geoserver="http(s)://IP:PORT"
let geoBuffer = null;
let geoApplied = false;
window.ADRUM = window.ADRUM || {};
window.ADRUM.geo = window.ADRUM.geo || {};

function applyGeoIfReady() {
    if (geoApplied || !geoBuffer) return;
    geoApplied = true;
    console.log("Setting tags")
    SplunkRum.setGlobalAttributes({
        'enduser.store': geoBuffer.city,
        'enduser.country': geoBuffer.country,
        'enduser.state': geoBuffer.region
    });
}

function getLocation(geoserver) {
    const s = document.createElement("script");
    s.src = geoserver;
    s.onload = function () {
        const r = window.ADRUM?.geo?.result;
        if (!r) {
            return;
        }
        geoBuffer = {
            city: r.city,
            country: r.country,
            region: r.region
        };
        applyGeoIfReady();
    };
    document.head.appendChild(s);
}

getLocation(geoserver+"/geo/resolve.js");
setTimeout(applyGeoIfReady, 1000);

//****** Tag custom geo location *******
</script>



</head>
<body>
<button id="testBtn">CLICK TO TRIGGER BEACON TO DEBUG</button>
<script>
document.getElementById("testBtn").onclick = function () {
    fetch("/abcd/return404")
        .then(r => r.text())
        .then(console.log)
        .catch(console.error);
};
</script>
</body>
